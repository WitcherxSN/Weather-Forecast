<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="./output.css" rel="stylesheet">
    <link rel="stylesheet" href="input.css">
</head>
<body >
     <header class="flex  flex-row items-center  justify-evenly shadow-md h-30 ">
    
    
    <div class="flex flex-row items-center justify-center gap-2">
        <span><img class="w-15 h-15" src="weather.png" alt="logo"></span>
        <span class="font-bold text-4xl text-blue-500 ">Weather</span>
        <span class="text-2xl text-gray-400"> Forecast</span>
    </div>
  
        <div class="flex items-center justify-center"> <input  id="searchInput" class=" h-15 w-200 border border-gray-300 p-2 rounded-s-xl text-xl" type="text" placeholder="Enter city, state, country..." > <button onclick="getWeather()" class=" flex items-center justify-center h-15 w-15 border border-gray-300 p-2 rounded-r-xl bg-blue-500 "  ><img class="h-7 w-7 " src="search.png" alt="search"></button></div>
        
    
    <div  > <button class=" h-15 w-70 flex items-center justify-center gap-2 border border-gray-300 p-2 rounded-xl text-xl text-white bg-blue-500 hover:bg-blue-600"> <div><img  class="w-5 h-5" src="navigation.png" alt="location"></div >Use Current Location</button></div>




</header>
<section class="flex items-center justify-center  hidden   h-10 border border-black p-4">
    <h1>Please Enter Valid Location</h1></section> 
    <p id="errorMsg" class="hidden text-red-500 ">Please enter valid location</p>


<nav>

    <div class="flex items-center justify-center  bg-gray-50 shadow-lg h-15">
        <span class="flex items-center justify-between gap-4  w-300">
            <a  class="flex items-center justify-center gap-2 font-medium text-gray-600 transition-all duration-300 ease-in-out 
       hover:text-yellow-500 hover:scale-110   " href="#"> <img class="h-6 w-6" src="global.png" alt="All World">All World</a>
            <a class="flex items-center justify-center gap-2 font-medium text-gray-600 transition-all duration-300 ease-in-out 
       hover:text-yellow-500 hover:scale-110 " href="#"> <img class="h-6 w-6" src="flag.png" alt="Countries">Countries</a>
            <a class="flex items-center justify-center gap-2 font-medium text-gray-600 transition-all duration-300 ease-in-out 
       hover:text-yellow-500 hover:scale-110  " href="#"> <img class="h-6 w-6" src="state.png" alt="States/Regions">States/Regions</a>

            <a class="flex items-center justify-center gap-2 font-medium  text-gray-600 transition-all duration-300 ease-in-out 
       hover:text-yellow-500 hover:scale-110  " href="#"> <img class="h-6 w-6" src="cities.png" alt="Cities">Cities</a>
            <a class="flex items-center justify-center gap-2 font-medium text-gray-600 transition-all duration-300 ease-in-out 
       hover:text-yellow-500 hover:scale-110  " href="#"> <img class="h-6 w-6" src="star.png" alt="Favorites">Favorites</a>
            <a class="flex items-center justify-center gap-2 font-medium text-gray-600 transition-all duration-300 ease-in-out 
       hover:text-yellow-500 hover:scale-110  " href="#"> <img class="h-6 w-6" src="about.png" alt="About">About</a>
            
        </span></div>
</nav>

<section class="flex flex-row items-center justify-center p-9 gap-1  ">
    
    <div 
      id="weathercontainer"
     class=" bg-gradient-to-br from-blue-600 to-sky-300 flex flex-col items-center justify-center h-120 w-140   rounded-2xl ">
     <div class="border h-50 w-120 flex items-center justify-between">
        <div><h2 id="city" class="text-4xl text-white "> Enter City Name</h2>
            
            <h4 id="date" class="text-xl text-gray-300 "></h4>
            
       <h3 id="temp" class="text-7xl text-white font-medium"></h3>
       <br>
       
        <p id="description" class="text-4xl text-white "></p>
        <p id="feelslike" class="text-xl text-white "></p>
    </div>
        <div><img id="weatherIcon" class=" "  src="" alt=""></div>
   
</div>
    
<div class="border h-50 w-130 flex items-end justify-between p-4 gap-4">

    <div class="border h-20 w-30 flex flex-col items-center justify-evenly "><h2 class="flex items-center justify-evenly text-white"><img class="h-6 w-6" src="humidity.png" alt="Humidity">Humidity</h2>
        <p id="humidity" class="text-white font-medium text-xl">--</p>
    </div>

    <div class="border h-20 w-30 flex flex-col items-center justify-evenly"><h2 class="flex items-center justify-evenly text-white"><img class="h-6 w-6" src="wind.png" alt="Wind Speed">Wind</h2>
        <p id="wind" class="text-white font-medium text-xl" >-- </p>
    </div>

    <div class="border h-20 w-30 flex flex-col items-center justify-evenly">
        <h2 class="flex items-center justify-evenly text-white"><img class="h-6 w-6" src="pressure.png" alt="Pressure">Pressure</h2>
        <p id="pressure" class="text-white font-medium text-xl " >-- </p>
    </div>

    <div class="border h-20 w-30 flex flex-col items-center justify-evenly">
        <h2 class="flex items-center justify-evenly text-white"><img class="h-6 w-6" src="visibility.png" alt="Visibility">Visibility</h2>
           <p id="visibility" class="text-white font-medium text-xl" >-- </p>
    </div>
    
</div>

    
    
    </div>
    <div class=" flex flex-col items-center justify-end  h-120 w-190">


        <div class=" flex items-center justify-between h-20 w-176  ">
             <h2 class="text-2xl font-medium text-gray-600">5 Days Forecast</h2>
             <div>
                <button class=" items-center h-10 w-10 bg-gray-400 rounded-xl hover:bg-blue-600 text-xl font-bold text-white">°C</button>
             <button class=" items-center h-10 w-10 bg-gray-400 rounded-xl hover:bg-blue-600 text-xl font-bold text-white">°F</button>
            </div>
             
            
        </div>
        
     
       
        <div  id="forecast" class="flex p-5 gap-4 items-center justify-center">
            
           <div  class="h-82 w-32 border-2 border-gray-200 shadow-lg rounded-2xl hover:transition-transform duration-300 hover:scale-105 group">
            <h2 id="day1"></h2>
            <img id="weatherIcon1" src="" alt="">
            <p id="forecastDesc1"></p>
            <p id="forecastTemp1"></p>  
            <p id="forecastwind1"></p> 
            <p id="humidity1"></p>
            

               

           </div>

           <div  class="h-82 w-32 border-2 border-gray-200 shadow-lg rounded-2xl hover:transition-transform duration-300 hover:scale-105 group">
            <h2 id="day2"></h2>
            <img id="weatherIcon2" src="" alt="">
            <p id="forecastDesc2"></p>
            <p id="forecastTemp2"></p>
            <p id="forecastwind2"></p>
            <p id="humidity2"></p>
            

           </div>
           <div  class="h-82 w-32 border-2 border-gray-200 shadow-lg rounded-2xl hover:transition-transform duration-300 hover:scale-105 group">
            <h2 id="day3"></h2>
            <img id="weatherIcon3" src="" alt="">
            <p id="forecastDesc3"></p>
            <p id="forecastTemp3"></p>
            <p id="forecastwind3"></p>
            <p id="humidity3"></p>
            

           </div>
           <div class="h-82 w-32 border-2 border-gray-200 shadow-lg rounded-2xl hover:transition-transform duration-300 hover:scale-105 group">
            <h2 id="day4"></h2>
            <img id="weatherIcon4" src="" alt="">
            <p id="forecastDesc4"></p>
            <p id="forecastTemp4"></p>
            <p id="forecastwind4"></p>
            <p id="humidity4"></p>
            

           </div>
           <div  class="  h-82 w-32 border-2 border-gray-200 shadow-lg rounded-2xl hover:transition-transform duration-300 hover:scale-105 group">
            <h2 id="day5"></h2>
            <img id="weatherIcon5" src="" alt=""> 
            <p id="forecastDesc5"></p>
            <p id="forecastTemp5"></p>  
            <p id="forecastwind5"></p>
            <p id="humidity5"></p>
           

          
               

           </div>
        </div>
        
    </div>
    



</section>
<script src="input.js"></script>

</html>
